<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circuit Sprint</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-shell">
    <header class="game-header">
      <div>
        <p class="eyebrow">Selainpeli</p>
        <h1>Circuit Sprint</h1>
      </div>
      <p class="instructions">Ohjaa: nuolinäppäimet tai WASD · Aja 3 kierrosta mahdollisimman nopeasti.</p>
    </header>

    <section class="game-panel" aria-label="Circuit Sprint -peli">
      <canvas id="gameCanvas" width="960" height="600" aria-label="Ylhäältä kuvattu kilpa-autorata"></canvas>

      <aside id="hud" class="hud" aria-live="polite">
        <div class="hud-card highlight">
          <span>Kierros</span>
          <strong id="lapDisplay">1/3</strong>
        </div>
        <div class="hud-card">
          <span>Kierrosaika</span>
          <strong id="currentLapTime">00:00.000</strong>
        </div>
        <div class="hud-card">
          <span>Edellinen</span>
          <strong id="lastLapTime">--:--.---</strong>
        </div>
        <div class="hud-card">
          <span>Paras</span>
          <strong id="bestLapTime">--:--.---</strong>
        </div>
        <div class="hud-card">
          <span>Kokonaisaika</span>
          <strong id="totalTime">00:00.000</strong>
        </div>
        <button id="hudRestartButton" class="hud-restart" type="button">Restart</button>
        <div class="status" id="statusMessage">Paina Restart aloittaaksesi ajanoton.</div>
      </aside>

      <div id="resultsOverlay" class="results-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="resultsTitle">
        <div class="results-card">
          <p class="eyebrow">Maali!</p>
          <h2 id="resultsTitle">Tulokset</h2>
          <dl id="resultsList" class="results-list"></dl>
          <button id="restartButton" type="button">Aja uudelleen</button>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
